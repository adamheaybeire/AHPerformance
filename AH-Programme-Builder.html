<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AH Performance — Programme Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ember: #E07A3A; --ember-light: #E8955E; --ember-dim: #B8612E;
  --sage: #8BB07E; --sage-light: #9FC294; --sage-dim: #6E8E63;
  --ocean: #4A9DC8; --ocean-light: #6BB0D4; --ocean-dim: #3A7EA0;
  --base: #0B1117; --deep-slate: #13232E; --card: #182A36; --raised: #1D3140;
  --linen: #F4F0EB; --card-light: #EDE8E2;
  --text-primary: #F4F0EB; --text-secondary: #8A9BAA; --text-muted: #5A6B7A;
  --border: rgba(255,255,255,0.08); --border-active: rgba(224,122,58,0.4);
  --radius: 12px; --radius-sm: 8px;
  --font-heading: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --danger: #E05A5A;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); background: var(--base); color: var(--text-primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.header { background: var(--deep-slate); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { font-family: var(--font-heading); font-weight: 700; font-size: 20px; color: var(--ember); }
.logo span { color: var(--text-secondary); font-weight: 400; font-size: 13px; margin-left: 8px; }
.header-actions { display: flex; gap: 10px; }
.btn { padding: 8px 16px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; }
.btn-primary { background: var(--ember); color: white; border-color: var(--ember); }
.btn-primary:hover { background: var(--ember-light); }
.btn-secondary { background: var(--raised); color: var(--text-secondary); }
.btn-secondary:hover { color: var(--ember); border-color: var(--ember); }
.btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: white; }
.btn-small { padding: 4px 10px; font-size: 11px; }

/* Programme Meta */
.programme-meta { background: var(--deep-slate); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 16px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
.meta-input { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; color: var(--text-primary); font-family: var(--font-body); font-size: 13px; outline: none; }
.meta-input:focus { border-color: var(--ember); }
.meta-input.wide { flex: 1; min-width: 200px; }
.meta-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-right: -8px; }

/* Main Layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Left Panel - Exercise Library */
.library-panel { width: 340px; min-width: 280px; background: var(--deep-slate); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.library-header { padding: 16px; border-bottom: 1px solid var(--border); }
.library-header h3 { font-family: var(--font-heading); font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text-secondary); }
.library-search { width: 100%; padding: 8px 12px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px; outline: none; margin-bottom: 8px; }
.library-search:focus { border-color: var(--ember); }
.library-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.library-filters select { padding: 5px 8px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); font-size: 11px; outline: none; cursor: pointer; }
.library-list { flex: 1; overflow-y: auto; padding: 8px; }
.lib-item { padding: 10px 12px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; cursor: grab; transition: all 0.2s; user-select: none; }
.lib-item:hover { border-color: var(--ember); transform: translateX(2px); }
.lib-item:active { cursor: grabbing; opacity: 0.7; }
.lib-item-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.lib-item-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 8px; }
.lib-badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.lib-badge-push { background: rgba(224,122,58,0.15); color: var(--ember-light); }
.lib-badge-pull { background: rgba(224,122,58,0.1); color: #D4915A; }
.lib-badge-hinge { background: rgba(139,176,126,0.15); color: var(--sage-light); }
.lib-badge-squat { background: rgba(139,176,126,0.2); color: #A5C99A; }
.lib-badge-lunge { background: rgba(139,176,126,0.1); color: #7DA872; }
.lib-badge-carry { background: rgba(74,157,200,0.15); color: var(--ocean-light); }
.lib-badge-rotation { background: rgba(160,120,200,0.15); color: #B89ADB; }
.lib-badge-cardio { background: rgba(224,160,58,0.15); color: #E0A03A; }
.lib-badge-flexibility { background: rgba(100,160,200,0.12); color: #7DBCE0; }
.lib-badge-warm-up { background: rgba(100,180,180,0.12); color: #7DC8C0; }
.lib-badge-core { background: rgba(160,170,180,0.15); color: #A0AAB4; }
.lib-count { padding: 8px 12px; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border); text-align: center; flex-shrink: 0; }

/* Right Panel - Programme */
.programme-panel { flex: 1; overflow-y: auto; padding: 20px 24px; }
.day-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.day-tab { padding: 8px 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
.day-tab.active { background: var(--ember); color: white; border-color: var(--ember); }
.day-tab:hover:not(.active) { border-color: var(--ember); color: var(--ember); }
.add-day-btn { padding: 8px 12px; background: transparent; border: 1px dashed var(--text-muted); border-radius: var(--radius-sm); color: var(--text-muted); font-size: 18px; cursor: pointer; transition: all 0.2s; line-height: 1; }
.add-day-btn:hover { border-color: var(--ember); color: var(--ember); }

/* Session tabs */
.session-tabs { display: flex; gap: 6px; padding: 8px 16px; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.15); }
.session-tab { padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text-secondary); background: transparent; border: 1px solid transparent; transition: all 0.2s; }
.session-tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.session-tab.active { background: var(--ocean); color: white; border-color: var(--ocean); }
.add-session-btn { padding: 4px 10px; background: transparent; border: 1px dashed var(--text-muted); border-radius: 6px; color: var(--text-muted); font-size: 11px; cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
.add-session-btn:hover { border-color: var(--ocean); color: var(--ocean); }

.day-content { display: none; }
.day-content.active { display: block; }
.day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.day-title-input { background: transparent; border: none; font-family: var(--font-heading); font-size: 22px; font-weight: 600; color: var(--text-primary); outline: none; flex: 1; }
.day-title-input::placeholder { color: var(--text-muted); }

/* Exercise Slots */
.exercise-list { min-height: 100px; }
.exercise-slot { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; transition: all 0.2s; position: relative; }
.exercise-slot:hover { border-color: rgba(255,255,255,0.15); }
.exercise-slot.superset-member { border-left: 3px solid var(--ember); margin-left: 16px; }
.exercise-slot.superset-start { border-left: 3px solid var(--ember); border-top-left-radius: var(--radius); margin-left: 16px; }
.slot-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.slot-exercise-name { font-family: var(--font-heading); font-size: 15px; font-weight: 600; flex: 1; }
.slot-actions { display: flex; gap: 6px; }
.slot-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: all 0.2s; }
.slot-remove:hover { color: var(--danger); background: rgba(224,90,90,0.1); }
.per-side-btn { background: var(--deep-slate); border: 1px solid var(--border); color: var(--text-secondary); padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; font-family: var(--font-body); transition: all 0.2s; }
.per-side-btn.active { background: var(--ocean); color: #fff; border-color: var(--ocean); }
.per-side-btn:hover { border-color: var(--ocean-light); }
.slot-fields { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.slot-field { display: flex; flex-direction: column; gap: 3px; }
.slot-field label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.slot-field input, .slot-field select { padding: 6px 10px; background: var(--raised); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 13px; font-family: var(--font-body); outline: none; width: auto; min-width: 70px; }
.slot-field input:focus, .slot-field select:focus { border-color: var(--ember); }
.slot-field input.note-input { min-width: 280px; }
.slot-badge { margin-right: 8px; }

/* Superset wrapper */
.superset-group { background: var(--deep-slate); border: 1px solid var(--border-active); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
.superset-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.superset-label { font-family: var(--font-heading); font-size: 12px; font-weight: 600; color: var(--ember); text-transform: uppercase; letter-spacing: 1px; }
.superset-fields { display: flex; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.superset-group .exercise-slot { margin-bottom: 8px; margin-left: 0; border-left: none; }
.superset-group .exercise-slot:last-of-type { margin-bottom: 0; }

/* Drop zone */
.drop-zone { border: 2px dashed var(--text-muted); border-radius: var(--radius); padding: 30px; text-align: center; color: var(--text-muted); font-size: 13px; margin-top: 10px; transition: all 0.2s; }
.drop-zone.drag-over { border-color: var(--ember); color: var(--ember); background: rgba(224,122,58,0.05); }

/* Action buttons row */
.day-actions { display: flex; gap: 8px; margin-top: 12px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 500px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
.modal h3 { font-family: var(--font-heading); font-size: 18px; margin-bottom: 16px; }
.modal-field { margin-bottom: 12px; }
.modal-field label { display: block; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.modal-field input, .modal-field textarea, .modal-field select { width: 100%; padding: 8px 12px; background: var(--raised); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: var(--font-body); font-size: 13px; outline: none; }
.modal-field textarea { resize: vertical; min-height: 60px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

/* Template list */
.template-item { padding: 12px; background: var(--raised); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
.template-item:hover { border-color: var(--ember); }
.template-item h4 { font-size: 14px; margin-bottom: 4px; }
.template-item p { font-size: 12px; color: var(--text-muted); }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--raised); border: 1px solid var(--sage); border-radius: var(--radius-sm); padding: 12px 20px; color: var(--sage); font-size: 13px; z-index: 2000; opacity: 0; transform: translateY(10px); transition: all 0.3s; }
.toast.show { opacity: 1; transform: translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">AH<span style="font-weight:400;color:var(--text-primary)"> Performance</span><span> Programme Builder</span></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="showTemplates()">Load Template</button>
    <button class="btn btn-secondary" onclick="saveAsTemplate()">Save as Template</button>
    <button class="btn btn-primary" onclick="exportProgramme()">Export Programme</button>
    <button class="btn btn-primary" id="assignBtn" onclick="assignToClient()" style="background:#8BB07E;border-color:#8BB07E;display:none;">Assign to Client</button>
  </div>
</div>

<div class="programme-meta">
  <span class="meta-label">Client</span>
  <input class="meta-input wide" id="clientName" placeholder="Client name..." />
  <select class="meta-input wide" id="clientSelect" style="display:none;" onfocus="if(window.parent!==window)window.parent.postMessage({type:'ah-request-clients'},'*')">
    <option value="">Select client...</option>
  </select>
  <span class="meta-label">Programme</span>
  <input class="meta-input wide" id="programmeName" placeholder="Programme name (e.g. Upper/Lower Split — Week 1)" />
  <span class="meta-label">Week</span>
  <input class="meta-input" id="weekNumber" type="number" value="1" min="1" style="width:60px" />
  <span class="meta-label">Start Date</span>
  <input class="meta-input" id="startDate" type="date" />
</div>

<div class="main">
  <!-- Library Panel -->
  <div class="library-panel">
    <div class="library-header">
      <h3>Exercise Library</h3>
      <input class="library-search" id="libSearch" placeholder="Search exercises..." oninput="filterLibrary()" />
      <div class="library-filters">
        <select id="libPattern" onchange="filterLibrary()">
          <option value="">All Patterns</option>
          <option>Push</option><option>Pull</option><option>Hinge</option><option>Squat</option>
          <option>Lunge</option><option>Carry</option><option>Rotation</option><option>Cardio</option>
          <option>Flexibility</option><option>Warm-up</option><option>Core</option>
        </select>
        <select id="libDifficulty" onchange="filterLibrary()">
          <option value="">All Levels</option>
          <option>Beginner</option><option>Intermediate</option><option>Advanced</option>
        </select>
      </div>
    </div>
    <div class="library-list" id="libraryList"></div>
    <div class="lib-count" id="libCount">0 exercises</div>
  </div>

  <!-- Programme Panel -->
  <div class="programme-panel" id="programmePanel">
    <div class="day-tabs" id="dayTabs"></div>
    <div id="dayContents"></div>
  </div>
</div>

<!-- Superset Modal -->
<div class="modal-overlay" id="supersetModal">
  <div class="modal">
    <h3>Superset / Circuit Settings</h3>
    <div class="modal-field">
      <label>Group Type</label>
      <select id="ssType"><option>Superset</option><option>Tri-Set</option><option>Circuit</option><option>Giant Set</option></select>
    </div>
    <div class="modal-field">
      <label>Rounds / Sets</label>
      <input type="number" id="ssRounds" value="3" min="1" />
    </div>
    <div class="modal-field">
      <label>Rest Between Exercises (seconds)</label>
      <input type="number" id="ssRestEx" value="0" min="0" step="5" />
    </div>
    <div class="modal-field">
      <label>Rest Between Rounds (seconds)</label>
      <input type="number" id="ssRestRound" value="90" min="0" step="5" />
    </div>
    <div class="modal-field">
      <label>Notes</label>
      <textarea id="ssNotes" placeholder="e.g. No rest between exercises, full rest between rounds..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeSupersetModal()">Cancel</button>
      <button class="btn btn-primary" onclick="applySupersetSettings()">Apply</button>
    </div>
  </div>
</div>

<!-- Template Modal -->
<div class="modal-overlay" id="templateModal">
  <div class="modal">
    <h3 id="templateModalTitle">Templates</h3>
    <div id="templateModalContent"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeTemplateModal()">Close</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h3>Programme Export</h3>
    <textarea id="exportContent" style="width:100%;min-height:400px;background:var(--raised);color:var(--text-primary);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:monospace;font-size:12px;" readonly></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeExportModal()">Close</button>
      <button class="btn btn-primary" onclick="copyExport()">Copy to Clipboard</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let programme = { days: [] };
let activeDay = 0;
let activeSessionIdx = 0;
let draggedExercise = null;
let activeSupersetGroup = null;
let templates = JSON.parse(localStorage.getItem('ah_templates') || '[]');

function currentSession() {
  const day = programme.days[activeDay];
  if (!day) return null;
  return day.sessions[activeSessionIdx];
}

// ── Library ──
function getBadgeClass(p) { return 'lib-badge-' + p.toLowerCase().replace(/[\s\/]/g, '-'); }

function filterLibrary() {
  const search = document.getElementById('libSearch').value.toLowerCase();
  const pattern = document.getElementById('libPattern').value;
  const diff = document.getElementById('libDifficulty').value;
  const filtered = exercises.filter(ex => {
    if (search && !ex.name.toLowerCase().includes(search) && !ex.primaryMuscles.toLowerCase().includes(search) && !ex.equipment.toLowerCase().includes(search)) return false;
    if (pattern && ex.movementPattern !== pattern) return false;
    if (diff && ex.difficulty !== diff) return false;
    return true;
  });
  const list = document.getElementById('libraryList');
  list.innerHTML = filtered.map(ex => `
    <div class="lib-item" draggable="true" ondragstart="dragStart(event, '${ex.id}')" ondblclick="addExerciseToDay('${ex.id}')">
      <div class="lib-item-name"><span class="lib-badge ${getBadgeClass(ex.movementPattern)}">${ex.movementPattern}</span> ${ex.name}</div>
      <div class="lib-item-meta"><span>${ex.equipment}</span><span>·</span><span>${ex.difficulty}</span><span>·</span><span>${ex.metricType}</span></div>
    </div>
  `).join('');
  document.getElementById('libCount').textContent = `${filtered.length} of ${exercises.length} exercises`;
}

function dragStart(e, id) { draggedExercise = id; e.dataTransfer.setData('text/plain', id); }

// ── Days ──
const ALL_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function addDay(name) {
  const dayIndex = programme.days.length;
  programme.days.push({ name: name || `Day ${dayIndex + 1}`, sessions: [{ focus: '', exercises: [], supersets: [] }] });
  renderDayTabs();
  switchDay(dayIndex);
}

function showAddDayMenu(btn) {
  let existing = document.getElementById('addDayMenu');
  if (existing) { existing.remove(); return; }
  const usedNames = programme.days.map(d => d.name);
  const available = ALL_DAYS.filter(d => !usedNames.includes(d));
  if (available.length === 0) { showToast('All days already added'); return; }
  const menu = document.createElement('div');
  menu.id = 'addDayMenu';
  menu.style.cssText = 'position:absolute;z-index:100;background:var(--raised);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 0;box-shadow:0 8px 24px rgba(0,0,0,0.4);min-width:150px;';
  const rect = btn.getBoundingClientRect();
  menu.style.top = (rect.bottom + 4) + 'px';
  menu.style.left = rect.left + 'px';
  available.forEach(day => {
    const opt = document.createElement('div');
    opt.textContent = day;
    opt.style.cssText = 'padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text-primary);';
    opt.onmouseenter = () => opt.style.background = 'var(--border)';
    opt.onmouseleave = () => opt.style.background = 'none';
    opt.onclick = () => { addDay(day); sortDays(); menu.remove(); };
    menu.appendChild(opt);
  });
  document.body.appendChild(menu);
  setTimeout(() => document.addEventListener('click', function closeMenu(ev) {
    if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('click', closeMenu); }
  }), 10);
}

function sortDays() {
  const order = {};
  ALL_DAYS.forEach((d, i) => order[d] = i);
  programme.days.sort((a, b) => {
    const ai = order[a.name] !== undefined ? order[a.name] : 99;
    const bi = order[b.name] !== undefined ? order[b.name] : 99;
    return ai - bi;
  });
  activeDay = Math.min(activeDay, programme.days.length - 1);
  renderDayTabs();
  renderDay();
}

function addSession() {
  const day = programme.days[activeDay];
  day.sessions.push({ focus: '', exercises: [], supersets: [] });
  activeSessionIdx = day.sessions.length - 1;
  renderDay();
  showToast('Session ' + day.sessions.length + ' added');
}

function removeSession(idx) {
  const day = programme.days[activeDay];
  if (day.sessions.length <= 1) return;
  day.sessions.splice(idx, 1);
  if (activeSessionIdx >= day.sessions.length) activeSessionIdx = day.sessions.length - 1;
  renderDay();
}

function switchSession(idx) {
  activeSessionIdx = idx;
  renderDay();
}

function removeDay(idx) {
  if (programme.days.length <= 1) return;
  programme.days.splice(idx, 1);
  if (activeDay >= programme.days.length) activeDay = programme.days.length - 1;
  renderDayTabs();
  renderDay();
}

function switchDay(idx) {
  activeDay = idx;
  activeSessionIdx = 0;
  renderDayTabs();
  renderDay();
}

function renderDayTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = programme.days.map((d, i) => `
    <div class="day-tab ${i === activeDay ? 'active' : ''}" onclick="switchDay(${i})">${d.name}${programme.days.length > 1 ? `<span onclick="event.stopPropagation();removeDay(${i})" style="margin-left:8px;opacity:0.5;cursor:pointer">×</span>` : ''}</div>
  `).join('') + `<button class="add-day-btn" onclick="showAddDayMenu(this)" title="Add day">+</button>`;
}

// ── Render Programme Day ──
function renderDay() {
  const day = programme.days[activeDay];
  if (!day) return;
  if (activeSessionIdx >= day.sessions.length) activeSessionIdx = 0;
  const sess = day.sessions[activeSessionIdx];
  const panel = document.getElementById('programmePanel');

  let html = '';

  // Session tabs (only show if >1 session or to allow adding)
  html += `<div class="session-tabs">`;
  html += day.sessions.map((s, si) => `
    <div class="session-tab ${si === activeSessionIdx ? 'active' : ''}" onclick="switchSession(${si})">
      ${s.focus || 'Session ' + (si + 1)}${day.sessions.length > 1 ? `<span onclick="event.stopPropagation();removeSession(${si})" style="margin-left:6px;opacity:0.4;cursor:pointer;font-size:11px">×</span>` : ''}
    </div>
  `).join('');
  html += `<button class="add-session-btn" onclick="addSession()" title="Add session to this day">+ Session</button>`;
  html += `</div>`;

  // Session focus input
  html += `<div class="day-header">
    <input class="day-title-input" value="${sess.focus}" onchange="currentSession().focus=this.value;renderDay()" placeholder="Session focus (e.g. Upper Body Push + Core, Long Run, Stretching...)" style="font-size:14px" />
  </div>`;

  html += `<div class="exercise-list" id="exerciseList">`;

  // Group exercises by superset membership
  let i = 0;
  while (i < sess.exercises.length) {
    const ex = sess.exercises[i];
    const ssGroup = sess.supersets.find(ss => ss.exerciseIndices.includes(i));

    if (ssGroup && ssGroup.exerciseIndices[0] === i) {
      html += renderSupersetGroup(sess, ssGroup);
      i = Math.max(...ssGroup.exerciseIndices) + 1;
    } else if (!ssGroup) {
      html += renderExerciseSlot(sess, i);
      i++;
    } else {
      i++;
    }
  }

  html += `</div>`;
  html += `<div class="drop-zone" id="dropZone" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropExercise(event)">
    Drag an exercise here or double-click in the library to add</div>`;

  html += `<div class="day-actions">
    <button class="btn btn-secondary btn-small" onclick="startSuperset()">Group as Superset</button>
    <button class="btn btn-secondary btn-small" onclick="addWarmupBlock()">+ Warm-up Block</button>
  </div>`;

  // Replace content after tabs
  const contents = document.getElementById('dayContents');
  if (!contents) {
    // First render - create container
    const contDiv = document.createElement('div');
    contDiv.id = 'dayContents';
    contDiv.innerHTML = html;
    panel.appendChild(contDiv);
  } else {
    contents.innerHTML = html;
  }
}

function renderExerciseSlot(day, idx) {
  const item = day.exercises[idx];
  const ex = exercises.find(e => e.id === item.exerciseId);
  if (!ex) return '';

  const metricLabel = ex.metricType === 'Weight × Reps' ? 'Reps' : ex.metricType === 'Distance / Time' ? 'Distance/Time' : ex.metricType === 'Time Hold' ? 'Duration' : 'Reps';
  const showWeight = ex.metricType === 'Weight × Reps';

  const perSideToggle = isUnilateral(ex.name) ? `<div class="slot-field" style="display:flex;align-items:center;gap:6px">
        <label style="white-space:nowrap">Per Side</label>
        <button onclick="togglePerSide(${idx})" class="per-side-btn ${item.perSide ? 'active' : ''}" title="Toggle Left/Right per side">${item.perSide ? 'L / R' : 'Both'}</button>
      </div>` : '';

  return `<div class="exercise-slot" data-idx="${idx}" draggable="true" ondragstart="dragStartReorder(event,${idx})" ondragover="dragOverReorder(event)" ondrop="dropReorder(event,${idx})" ondragend="dragEndReorder(event)" style="cursor:grab;">
    <div class="slot-top">
      <div class="slot-exercise-name">
        <span style="cursor:grab;color:var(--text-dim);margin-right:6px;font-size:14px;" title="Drag to reorder">⠿</span>
        <span class="slot-badge lib-badge ${getBadgeClass(ex.movementPattern)}">${ex.movementPattern}</span>
        ${ex.name}${item.perSide ? ' <span style="color:var(--ocean);font-size:11px;font-weight:600;margin-left:6px">L / R</span>' : ''}
      </div>
      <div class="slot-actions">
        <input type="checkbox" class="ss-check" data-idx="${idx}" title="Select for superset" style="cursor:pointer" />
        <button class="slot-remove" onclick="moveExercise(${idx},-1)" title="Move up">▲</button>
        <button class="slot-remove" onclick="moveExercise(${idx},1)" title="Move down">▼</button>
        <button class="slot-remove" onclick="removeExercise(${idx})" title="Remove">×</button>
      </div>
    </div>
    <div class="slot-fields">
      <div class="slot-field">
        <label>Sets</label>
        <input type="number" value="${item.sets}" min="1" onchange="updateField(${idx},'sets',this.value)" style="width:55px" />
      </div>
      <div class="slot-field">
        <label>${metricLabel}</label>
        <input type="text" value="${item.reps}" onchange="updateField(${idx},'reps',this.value)" style="width:90px" placeholder="${ex.metricType === 'Distance / Time' ? '1km / 5:00' : ex.metricType === 'Time Hold' ? '45s' : '10'}" />
      </div>
      ${showWeight ? `<div class="slot-field">
        <label>Weight</label>
        <input type="text" value="${item.weight}" onchange="updateField(${idx},'weight',this.value)" style="width:80px" placeholder="70kg" />
      </div>` : ''}
      <div class="slot-field">
        <label>Intensity</label>
        <input type="text" value="${item.intensity}" onchange="updateField(${idx},'intensity',this.value)" style="width:90px" placeholder="RPE 7 / 80%" />
      </div>
      <div class="slot-field">
        <label>Rest</label>
        <input type="text" value="${item.rest}" onchange="updateField(${idx},'rest',this.value)" style="width:70px" placeholder="90s" />
      </div>
      ${perSideToggle}
      <div class="slot-field">
        <label>Coach Note</label>
        <input type="text" class="note-input" value="${item.note || ''}" onchange="updateField(${idx},'note',this.value)" placeholder="Client-specific note..." />
      </div>
    </div>
  </div>`;
}

function renderSupersetGroup(day, ss) {
  let html = `<div class="superset-group" data-ss-id="${ss.id}">
    <div class="superset-header">
      <span class="superset-label">${ss.type} — ${ss.rounds} rounds</span>
      <div>
        <button class="btn btn-small btn-secondary" onclick="editSuperset('${ss.id}')">Edit</button>
        <button class="btn btn-small btn-danger" onclick="ungroupSuperset('${ss.id}')">Ungroup</button>
      </div>
    </div>`;
  if (ss.notes) html += `<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;font-style:italic">${ss.notes}</div>`;
  ss.exerciseIndices.forEach(idx => { html += renderExerciseSlot(day, idx); });
  html += `<div class="superset-fields">
    <div class="slot-field"><label>Rest Between Exercises</label><span style="font-size:13px;color:var(--text-secondary)">${ss.restBetweenEx}s</span></div>
    <div class="slot-field"><label>Rest Between Rounds</label><span style="font-size:13px;color:var(--text-secondary)">${ss.restBetweenRound}s</span></div>
  </div></div>`;
  return html;
}

// ── Exercise Operations ──
const UNILATERAL_KEYWORDS = ['single leg','single arm','bulgarian','lunge','split squat','step up','pistol','side plank','one arm','one leg','unilateral','lateral raise','side raise','concentration curl','single-arm','single-leg'];

function isUnilateral(exName) {
  const lower = exName.toLowerCase();
  return UNILATERAL_KEYWORDS.some(kw => lower.includes(kw));
}

function addExerciseToDay(exId) {
  const sess = currentSession();
  const ex = exercises.find(e => e.id === exId);
  const unilateral = ex ? isUnilateral(ex.name) : false;
  sess.exercises.push({ exerciseId: exId, sets: 3, reps: '', weight: '', intensity: '', rest: '90s', note: '', perSide: unilateral });
  renderDay();
  showToast('Exercise added');
}

function removeExercise(idx) {
  const sess = currentSession();
  sess.supersets.forEach(ss => {
    ss.exerciseIndices = ss.exerciseIndices.filter(i => i !== idx).map(i => i > idx ? i - 1 : i);
  });
  sess.supersets = sess.supersets.filter(ss => ss.exerciseIndices.length > 1);
  sess.exercises.splice(idx, 1);
  renderDay();
}

function moveExercise(idx, dir) {
  const sess = currentSession();
  if (!sess || !sess.exercises) return;

  // Tag each exercise with its superset membership
  sess.exercises.forEach((ex, i) => { ex._ssTag = null; });
  sess.supersets.forEach((ss, si) => {
    ss.exerciseIndices.forEach(i => {
      if (sess.exercises[i]) sess.exercises[i]._ssTag = si;
    });
  });

  const parentSSIdx = sess.exercises[idx] ? sess.exercises[idx]._ssTag : null;

  if (parentSSIdx !== null) {
    // Exercise is in a superset — move the entire group
    const ss = sess.supersets[parentSSIdx];
    const groupIndices = [...ss.exerciseIndices].sort((a,b) => a - b);
    const minIdx = groupIndices[0];
    const maxIdx = groupIndices[groupIndices.length - 1];
    const groupSize = groupIndices.length;

    if (dir === -1) {
      if (minIdx <= 0) return;
      // Find what's above: could be a single exercise or another superset
      const aboveTag = sess.exercises[minIdx - 1]._ssTag;
      let blockStart = minIdx - 1;
      if (aboveTag !== null) {
        // Another superset above — find its start
        const aboveIndices = sess.supersets[aboveTag].exerciseIndices.sort((a,b) => a - b);
        blockStart = aboveIndices[0];
      }
      // Extract our group, insert before blockStart
      const group = sess.exercises.splice(minIdx, groupSize);
      sess.exercises.splice(blockStart, 0, ...group);
    } else {
      if (maxIdx >= sess.exercises.length - 1) return;
      const belowTag = sess.exercises[maxIdx + 1]._ssTag;
      let blockEnd = maxIdx + 1;
      if (belowTag !== null) {
        const belowIndices = sess.supersets[belowTag].exerciseIndices.sort((a,b) => a - b);
        blockEnd = belowIndices[belowIndices.length - 1];
      }
      // Extract our group, insert after blockEnd
      const group = sess.exercises.splice(minIdx, groupSize);
      const insertAt = blockEnd - groupSize + 1;
      sess.exercises.splice(insertAt, 0, ...group);
    }
  } else {
    // Single exercise
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= sess.exercises.length) return;

    const targetTag = sess.exercises[newIdx]._ssTag;
    if (targetTag !== null) {
      // Target is in a superset — skip over the entire group
      const targetIndices = sess.supersets[targetTag].exerciseIndices.sort((a,b) => a - b);
      const ex = sess.exercises.splice(idx, 1)[0];
      if (dir === -1) {
        sess.exercises.splice(targetIndices[0], 0, ex);
      } else {
        // After removing idx, the max index of the superset may have shifted
        const adjustedMax = targetIndices[targetIndices.length - 1] - (idx < targetIndices[targetIndices.length - 1] ? 1 : 0);
        sess.exercises.splice(adjustedMax + 1, 0, ex);
      }
    } else {
      // Simple swap
      [sess.exercises[idx], sess.exercises[newIdx]] = [sess.exercises[newIdx], sess.exercises[idx]];
    }
  }

  // Rebuild all superset indices from _ssTag
  sess.supersets.forEach(ss => { ss.exerciseIndices = []; });
  sess.exercises.forEach((ex, i) => {
    if (ex._ssTag !== null && sess.supersets[ex._ssTag]) {
      sess.supersets[ex._ssTag].exerciseIndices.push(i);
    }
    delete ex._ssTag;
  });

  renderDay();
}

// ── Drag-to-reorder exercises ──
let dragReorderIdx = null;
function dragStartReorder(e, idx) {
  dragReorderIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'reorder-' + idx);
  e.target.closest('.exercise-slot').style.opacity = '0.4';
}
function dragOverReorder(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const slot = e.target.closest('.exercise-slot');
  if (slot) {
    document.querySelectorAll('.exercise-slot').forEach(s => s.style.borderTop = '');
    slot.style.borderTop = '3px solid var(--primary)';
  }
}
function dropReorder(e, targetIdx) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.exercise-slot').forEach(s => { s.style.borderTop = ''; s.style.opacity = '1'; });
  if (dragReorderIdx === null || dragReorderIdx === targetIdx) return;
  const sess = currentSession();
  if (!sess) return;

  // Tag exercises with superset membership
  sess.exercises.forEach((ex, i) => { ex._ssTag = null; });
  sess.supersets.forEach((ss, si) => {
    ss.exerciseIndices.forEach(i => { if (sess.exercises[i]) sess.exercises[i]._ssTag = si; });
  });

  // Extract the dragged exercise and insert at target position
  const [moved] = sess.exercises.splice(dragReorderIdx, 1);
  const insertIdx = targetIdx > dragReorderIdx ? targetIdx - 1 : targetIdx;
  sess.exercises.splice(insertIdx, 0, moved);

  // Rebuild superset indices
  sess.supersets.forEach(ss => { ss.exerciseIndices = []; });
  sess.exercises.forEach((ex, i) => {
    if (ex._ssTag !== null && sess.supersets[ex._ssTag]) {
      sess.supersets[ex._ssTag].exerciseIndices.push(i);
    }
    delete ex._ssTag;
  });

  dragReorderIdx = null;
  renderDay();
}
function dragEndReorder(e) {
  document.querySelectorAll('.exercise-slot').forEach(s => { s.style.borderTop = ''; s.style.opacity = '1'; });
  dragReorderIdx = null;
}

function updateField(idx, field, value) {
  currentSession().exercises[idx][field] = value;
}

function togglePerSide(idx) {
  const item = currentSession().exercises[idx];
  item.perSide = !item.perSide;
  renderDay();
}

function dropExercise(e) {
  e.preventDefault();
  const id = e.dataTransfer.getData('text/plain') || draggedExercise;
  if (id) addExerciseToDay(id);
  e.target.classList.remove('drag-over');
}

function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

// ── Supersets ──
function startSuperset() {
  const checks = document.querySelectorAll('.ss-check:checked');
  if (checks.length < 2) { showToast('Select 2+ exercises to group'); return; }
  const indices = Array.from(checks).map(c => parseInt(c.dataset.idx)).sort((a, b) => a - b);
  activeSupersetGroup = indices;
  document.getElementById('ssRounds').value = 3;
  document.getElementById('ssRestEx').value = 0;
  document.getElementById('ssRestRound').value = 90;
  document.getElementById('ssNotes').value = '';
  document.getElementById('supersetModal').classList.add('show');
}

function closeSupersetModal() { document.getElementById('supersetModal').classList.remove('show'); }

function applySupersetSettings() {
  const sess = currentSession();
  const ss = {
    id: 'ss_' + Date.now(),
    type: document.getElementById('ssType').value,
    rounds: parseInt(document.getElementById('ssRounds').value),
    restBetweenEx: parseInt(document.getElementById('ssRestEx').value),
    restBetweenRound: parseInt(document.getElementById('ssRestRound').value),
    notes: document.getElementById('ssNotes').value,
    exerciseIndices: activeSupersetGroup
  };
  sess.supersets.push(ss);
  closeSupersetModal();
  renderDay();
  showToast(ss.type + ' created');
}

function editSuperset(ssId) {
  const sess = currentSession();
  if (!sess) return;
  const ss = sess.supersets.find(s => s.id === ssId);
  if (!ss) return;
  activeSupersetGroup = ss.exerciseIndices;
  document.getElementById('ssType').value = ss.type;
  document.getElementById('ssRounds').value = ss.rounds;
  document.getElementById('ssRestEx').value = ss.restBetweenEx;
  document.getElementById('ssRestRound').value = ss.restBetweenRound;
  document.getElementById('ssNotes').value = ss.notes || '';
  // Remove old, apply will recreate
  sess.supersets = sess.supersets.filter(s => s.id !== ssId);
  document.getElementById('supersetModal').classList.add('show');
}

function ungroupSuperset(ssId) {
  const sess = currentSession();
  if (!sess) return;
  sess.supersets = sess.supersets.filter(s => s.id !== ssId);
  renderDay();
  showToast('Superset ungrouped');
}

// ── Warm-up Block ──
function addWarmupBlock() {
  const warmups = exercises.filter(e => e.warmupSuitable || e.movementPattern === 'Warm-up' || e.movementPattern === 'Flexibility');
  const shuffled = warmups.sort(() => Math.random() - 0.5);
  // Pick a mix: 2-3 warm-up, 1-2 flexibility
  const wuPool = shuffled.filter(e => e.movementPattern === 'Warm-up');
  const flexPool = shuffled.filter(e => e.movementPattern === 'Flexibility');
  const picks = [...wuPool.slice(0, 3), ...flexPool.slice(0, 2)].slice(0, 5);
  // If not enough of one type, fill from the other
  if (picks.length < 5) {
    const ids = new Set(picks.map(p => p.id));
    const remaining = shuffled.filter(e => !ids.has(e.id));
    picks.push(...remaining.slice(0, 5 - picks.length));
  }
  picks.forEach(ex => {
    currentSession().exercises.push({
      exerciseId: ex.id, sets: 2,
      reps: ex.metricType === 'Time Hold' ? '30s' : ex.metricType === 'Distance / Time' ? '30s' : '10',
      weight: '', intensity: 'Light', rest: '15s', note: ex.movementPattern === 'Flexibility' ? 'Mobility / Flexibility' : 'Warm-up'
    });
  });
  renderDay();
  showToast('Warm-up & flexibility block added (' + picks.length + ' exercises)');
}

function showTemplates() {
  document.getElementById('templateModalTitle').textContent = 'Load Template';
  const content = document.getElementById('templateModalContent');
  if (templates.length === 0) {
    content.innerHTML = '<p style="color:var(--text-muted);padding:20px;text-align:center">No saved templates yet. Build a programme and save it as a template.</p>';
  } else {
    content.innerHTML = templates.map((t, i) => `
      <div class="template-item" onclick="loadTemplate(${i})">

      </div>

  document.getElementById('templateModal').classList.add('show');
}

function loadTemplate(idx) {
  programme = JSON.parse(JSON.stringify(templates[idx].programme));

  activeSessionIdx = 0;

  renderDay();

}

function closeTemplateModal() { document.getElementById('templateModal').classList.remove('show'); }

// ── Export ──
function exportProgramme() {
  const client = document.getElementById('clientName').value || 'Client';
  const progName = document.getElementById('programmeName').value || 'Programme';
  const week = document.getElementById('weekNumber').value;
  const date = document.getElementById('startDate').value;

  let text = `AH PERFORMANCE — CLIENT PROGRAMME\n`;
  text += `${'='.repeat(50)}\n`;
  text += `Client: ${client}\n`;
  text += `Programme: ${progName}\n`;
  text += `Week: ${week}${date ? ' | Start: ' + date : ''}\n`;
  text += `${'='.repeat(50)}\n\n`;

  programme.days.forEach(day => {
    text += `┌${'\u2500'.repeat(48)}┐\n`;
    text += `│ ${day.name.toUpperCase().padEnd(47)}│\n`;
    text += `└${'\u2500'.repeat(48)}┘\n\n`;

    day.sessions.forEach((sess, si) => {
      if (day.sessions.length > 1 || sess.focus) {
        text += `  ▶ ${sess.focus || 'Session ' + (si + 1)}\n`;

      }

    let i = 0;
    let exerciseNum = 1;
    while (i < sess.exercises.length) {

      if (ssGroup) {
        text += `  ${exerciseNum}. ${ssGroup.type.toUpperCase()} — ${ssGroup.rounds} rounds\n`;
        if (ssGroup.notes) text += `     ${ssGroup.notes}\n`;

          const item = sess.exercises[idx];
          const ex = exercises.find(e => e.id === item.exerciseId);
          if (!ex) return;
          text += `     ${String.fromCharCode(97 + j)}) ${ex.name}${item.perSide ? ' (each side)' : ''}`;
          text += ` — ${item.sets} sets`;
          if (item.reps) text += ` × ${item.reps}`;
          if (item.weight) text += ` @ ${item.weight}`;
          if (item.intensity) text += ` (${item.intensity})`;
          text += `\n`;
          if (item.note) text += `        ↳ ${item.note}\n`;
        });
        text += `     Rest between exercises: ${ssGroup.restBetweenEx}s | Between rounds: ${ssGroup.restBetweenRound}s\n\n`;
        i = Math.max(...ssGroup.exerciseIndices) + 1;
      } else {
        const item = sess.exercises[i];
        const ex = exercises.find(e => e.id === item.exerciseId);
        if (ex) {
          text += `  ${exerciseNum}. ${ex.name}${item.perSide ? ' (each side)' : ''}`;
          text += ` — ${item.sets} sets`;
          if (item.reps) text += ` × ${item.reps}`;
          if (item.weight) text += ` @ ${item.weight}`;
          if (item.intensity) text += ` (${item.intensity})`;
          if (item.rest) text += ` | Rest: ${item.rest}`;
          text += `\n`;
          if (item.note) text += `     ↳ ${item.note}\n`;
          text += `\n`;
        }
        i++;
      }
      exerciseNum++;
    }
    text += `\n`;
    }); // end sessions
    text += `\n`;
  });

  text += `${'\u2500'.repeat(50)}\n`;
  text += `AH Performance | Performance for real life\n`;

  document.getElementById('exportContent').value = text;
  document.getElementById('exportModal').classList.add('show');
}

function closeExportModal() { document.getElementById('exportModal').classList.remove('show'); }
function copyExport() {
  navigator.clipboard.writeText(document.getElementById('exportContent').value);
  showToast('Copied to clipboard');
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Parent App Integration (postMessage) ──
let embeddedClients = [];
const isEmbedded = window.parent !== window;

function assignToClient() {
  const sel = document.getElementById('clientSelect');
  const clientId = parseInt(sel.value);
  if (!clientId) { showToast('Please select a client first'); return; }
  const client = embeddedClients.find(c => c.id === clientId);
  if (!client) return;

  const progName = document.getElementById('programmeName').value || 'Untitled Programme';
  const weekNum = parseInt(document.getElementById('weekNumber').value) || 1;
  const startDate = document.getElementById('startDate').value || '';

  // Resolve exercise names and send programme data to parent app
  const resolved = JSON.parse(JSON.stringify(programme));
  resolved.days.forEach(day => {
    day.sessions.forEach(sess => {
      (sess.exercises || []).forEach(item => {
        const ex = exercises.find(e => e.id === item.exerciseId);
        item.resolvedName = ex ? ex.name : item.exerciseId;
        item.movementPattern = ex ? ex.movementPattern : '';
        // Include detail data for exercise modal on client side
        if (ex) {
          item.exDetail = {
            cat: (ex.movementPattern || '') + (ex.primaryMuscles ? ' · ' + ex.primaryMuscles.split(',')[0].trim() : ''),
            muscles: [ex.primaryMuscles, ex.secondaryMuscles].filter(Boolean).join(', '),
            setup: ex.description || '',
            cues: (ex.coachingCues || []).join('. '),
            mistakes: (ex.commonMistakes || []).join('. ')
          };
        }
      });
    });
  });

  window.parent.postMessage({
    type: 'ah-assign-programme',
    clientId: clientId,
    clientName: client.name,
    programmeName: progName,
    weekNumber: weekNum,
    startDate: startDate,
    programme: resolved
  }, '*');

  showToast('Programme assigned to ' + client.name);
}

function saveProgrammeToApp() {
  const progName = document.getElementById('programmeName').value || 'Untitled Programme';
  const weekNum = parseInt(document.getElementById('weekNumber').value) || 1;
  const startDate = document.getElementById('startDate').value || '';

  window.parent.postMessage({
    type: 'ah-save-programme',
    programmeName: progName,
    weekNumber: weekNum,
    startDate: startDate,
    programme: programme
  }, '*');

  showToast('Programme saved to app');
}

// Listen for client list from parent
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'ah-client-list') {
    embeddedClients = e.data.clients || [];
    const sel = document.getElementById('clientSelect');
    sel.innerHTML = '<option value="">Select client...</option>' +
      embeddedClients.map(c => `<option value="${c.id}">${c.name} — ${c.programme || 'No programme'}</option>`).join('');
  }
  if (e.data && e.data.type === 'ah-select-client') {
    const sel = document.getElementById('clientSelect');
    if (sel) sel.value = e.data.clientId;
  }
});

  document.getElementById('assignBtn').style.display = '';
  document.getElementById('clientSelect').style.display = '';

  window.parent.postMessage({ type: 'ah-request-clients' }, '*');
}
